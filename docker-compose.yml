version: '3.8'

services:
  server-ru:
    build:
      context: .
      dockerfile: shared/Dockerfile
    container_name: awg-ru
    cap_add:
      - NET_ADMIN
    ports:
      - "51820:51820/udp"
    volumes:
      - ./server-ru/entrypoint.sh:/entrypoint.sh:ro
      - ./server-ru/awg0.conf.template:/config/awg0.conf.template:ro
      - server-ru-keys:/etc/amnezia/amneziawg
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      tunnel_net:
        ipv4_address: 10.0.0.2
    restart: unless-stopped

  server-am:
    build:
      context: .
      dockerfile: shared/Dockerfile
    container_name: awg-am
    cap_add:
      - NET_ADMIN
    ports:
      - "51821:51820/udp"
    volumes:
      - ./server-am/entrypoint.sh:/entrypoint.sh:ro
      - ./server-am/awg0.conf.template:/config/awg0.conf.template:ro
      - server-am-keys:/etc/amnezia/amneziawg
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      tunnel_net:
        ipv4_address: 10.0.0.3
    restart: unless-stopped

volumes:
  server-ru-keys:
  server-am-keys:

networks:
  tunnel_net:
    ipam:
      config:
        - subnet: 10.0.0.0/24
